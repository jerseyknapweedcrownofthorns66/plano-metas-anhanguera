<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap');

:root{
  --brand-1:#F2600F;
  --brand-2:#E2371E;
  --brand-3:#E8932A;
  --brand-deep:#B82E0F;
  --brand-grad: linear-gradient(120deg,var(--brand-3),var(--brand-1) 55%,var(--brand-2));
  --ink:#2b2728;
  --ink-soft:#5b5450;
  --paper:#FBF8F4;
  --paper-2:#F3E9DC;
  --card:#FFFFFF;
  --gold:#b9842c;
  --gold-light:#e7c277;
  --gold-deep:#8a6320;
  --teal:#2f6f5e;
  --teal-light:#dcebe5;
  --danger:#8c3a2c;
  --danger-light:#f3ddd3;
  --line:#e7ddd0;
  --gray:#8b8580;
  --shadow:0 1px 2px rgba(28,32,36,.04), 0 6px 16px rgba(28,32,36,.06);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:'Inter',sans-serif;
  background:var(--paper);
  color:var(--ink);
  -webkit-font-smoothing:antialiased;
}
h1,h2,h3,.tab-title{font-family:'Space Grotesk',sans-serif;}
.mono{font-family:'IBM Plex Mono',monospace;}

.app{display:flex;min-height:100vh;}

/* SIDEBAR */
.sidebar{
  width:248px;
  flex-shrink:0;
  background:linear-gradient(180deg,#241f1c,#191513 65%);
  color:#e9e6dd;
  display:flex;
  flex-direction:column;
  padding:22px 16px;
  position:sticky;
  top:0;
  height:100vh;
  position:relative;
  overflow:hidden;
}
.sidebar::before{
  content:'';position:absolute;top:0;left:0;right:0;height:4px;
  background:var(--brand-grad);
}
.logo-card{
  background:#fff;border-radius:12px;padding:10px 12px;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 14px rgba(0,0,0,.25);
  margin-top:4px;
}
.logo-card img{max-width:100%;height:34px;object-fit:contain;display:block;}
.brand{margin-top:10px;}
.brand small{display:block;font-family:'Inter';font-weight:500;font-size:11.5px;color:#b8b2a3;letter-spacing:.3px;text-transform:uppercase;}
nav{margin-top:26px;display:flex;flex-direction:column;gap:2px;flex:1;}
.navlink{
  display:flex;align-items:center;gap:10px;
  padding:9px 10px;border-radius:8px;
  color:#cfc9ba;font-size:13.5px;font-weight:500;
  cursor:pointer;border:none;background:none;text-align:left;width:100%;
  transition:background .15s, color .15s;
}
.navlink:hover{background:rgba(255,255,255,.07);color:#fff;}
.navlink.active{background:var(--brand-grad);color:#fff;font-weight:600;box-shadow:0 3px 10px rgba(226,55,30,.35);}
.navlink .dot{width:6px;height:6px;border-radius:50%;background:currentColor;opacity:.55;flex-shrink:0;}
.sidebar-foot{font-size:11px;color:#867f6e;padding-top:14px;border-top:1px solid rgba(255,255,255,.08);margin-top:10px;}
.sidebar-user{font-size:12px;color:#e9e6dd;font-weight:600;}

/* MAIN */
.content{flex:1;min-width:0;display:flex;flex-direction:column;}
.topbar{
  padding:22px 32px 0 32px;
  display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap;
}
.topbar h1{font-size:21px;margin:0 0 4px;font-weight:700;}
.topbar .sub{color:var(--ink-soft);font-size:13px;margin:0;max-width:640px;line-height:1.5;}
.mobile-toggle{display:none;}

main.scroll{padding:18px 32px 60px 32px;flex:1;}

.tab-panel{display:none;animation:fade .25s ease;}
.tab-panel.active{display:block;}
@keyframes fade{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}

/* CARDS / GRID */
.grid{display:grid;gap:16px;}
.grid.cols-4{grid-template-columns:repeat(4,1fr);}
.grid.cols-3{grid-template-columns:repeat(3,1fr);}
.grid.cols-2{grid-template-columns:repeat(2,1fr);}
@media(max-width:1100px){.grid.cols-4{grid-template-columns:repeat(2,1fr);}.grid.cols-3{grid-template-columns:repeat(2,1fr);}}
@media(max-width:680px){.grid.cols-4,.grid.cols-3,.grid.cols-2{grid-template-columns:1fr;}}

.card{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:14px;
  padding:18px 18px;
  box-shadow:var(--shadow);
}
.card.stat{display:flex;flex-direction:column;gap:6px;}
.card.stat .label{font-size:11.5px;text-transform:uppercase;letter-spacing:.5px;color:var(--gray);font-weight:600;}
.card.stat .value{font-size:25px;font-weight:700;font-family:'IBM Plex Mono',monospace;}
.card.stat .meta{font-size:12px;color:var(--ink-soft);}

.section-head{display:flex;align-items:baseline;justify-content:space-between;gap:12px;margin:28px 0 12px;flex-wrap:wrap;}
.section-head h2{font-size:16px;margin:0;font-weight:700;}
.section-head .note{font-size:12px;color:var(--gray);}

.rule-box{
  background:var(--paper-2);
  border:1px dashed var(--line);
  border-radius:10px;
  padding:12px 14px;
  font-size:12.5px;
  color:var(--ink-soft);
  line-height:1.55;
  margin-bottom:16px;
}
.rule-box b{color:var(--ink);}

/* TABLE */
table{width:100%;border-collapse:collapse;font-size:13px;}
table.app-table{background:var(--card);border:1px solid var(--line);border-radius:12px;overflow:hidden;}
table.app-table thead th{
  background:var(--paper-2);
  text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.4px;
  color:var(--ink-soft);font-weight:600;padding:10px 12px;border-bottom:1px solid var(--line);
}
table.app-table td{padding:10px 12px;border-bottom:1px solid var(--line);vertical-align:middle;}
table.app-table tr:last-child td{border-bottom:none;}
table.app-table tbody tr:hover{background:#fbf3ea;}
.num{font-family:'IBM Plex Mono',monospace;text-align:right;}

input,select{
  font-family:'IBM Plex Mono',monospace;
  font-size:12.5px;
  border:1px solid var(--line);
  border-radius:7px;
  padding:6px 8px;
  background:#fff;
  color:var(--ink);
  width:100%;
}
input[type=text],input[type=date],input[type=password]{font-family:'Inter';}
select{font-family:'Inter';}
input:focus,select:focus{outline:2px solid var(--brand-1);outline-offset:1px;}
label.field{display:flex;flex-direction:column;gap:4px;font-size:11.5px;color:var(--ink-soft);font-weight:600;}

button{font-family:'Inter';cursor:pointer;}
.btn{
  border:1px solid var(--line);background:var(--card);color:var(--ink);
  padding:8px 14px;border-radius:8px;font-size:13px;font-weight:600;
  transition:transform .1s, box-shadow .15s;
}
.btn:hover{box-shadow:var(--shadow);}
.btn:active{transform:scale(.97);}
.btn.primary{background:var(--ink);color:#fff;border-color:var(--ink);}
.btn.gold{background:var(--brand-grad);color:#fff;border-color:var(--brand-deep);}
.btn.danger{background:var(--danger-light);color:var(--danger);border-color:var(--danger);}
.btn.ghost{background:transparent;border-color:transparent;color:var(--ink-soft);}
.btn.sm{padding:5px 9px;font-size:12px;border-radius:6px;}
.btn:disabled{opacity:.45;cursor:not-allowed;}
.btn:focus-visible{outline:2px solid var(--brand-1);outline-offset:2px;}

.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:99px;font-size:11px;font-weight:700;letter-spacing:.2px;}
.badge.ok{background:var(--teal-light);color:var(--teal);}
.badge.no{background:var(--paper-2);color:var(--ink-soft);}
.badge.idle{background:var(--paper-2);color:var(--gray);}

/* SEAL — signature element for premio atingido */
.seal-badge{
  width:38px;height:38px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:700;font-family:'IBM Plex Mono',monospace;
  border:2px solid var(--line);color:var(--gray);background:#fff;
}
.seal-badge.hit{
  border-color:var(--gold-deep);
  background:radial-gradient(circle at 35% 30%,var(--gold-light),var(--gold));
  color:#3a2a06;
  box-shadow:0 2px 6px rgba(138,99,32,.35), inset 0 0 0 2px rgba(255,255,255,.3);
}

.emp-row{display:flex;align-items:center;gap:12px;padding:12px;border:1px solid var(--line);border-radius:12px;background:var(--card);margin-bottom:10px;}
.emp-row .who{min-width:170px;}
.emp-row .who .nm{font-weight:600;font-size:13.5px;}
.emp-row .who .cg{font-size:11.5px;color:var(--gray);}
.emp-row .inputs{display:flex;gap:14px;flex:1;flex-wrap:wrap;}
.emp-row .inputs label.field{min-width:120px;}
.emp-row .result{min-width:130px;text-align:right;}
.emp-row .result .v{font-family:'IBM Plex Mono',monospace;font-weight:700;font-size:14px;}
.emp-row .result .p{font-size:11px;color:var(--gray);}
@media(max-width:760px){.emp-row{flex-wrap:wrap;}.emp-row .result{text-align:left;margin-left:50px;}}

/* TOGGLE BUTTON GROUP — meta móvel: bateu / não bateu */
.toggle-field{display:flex;flex-direction:column;gap:4px;min-width:170px;}
.toggle-field .lbl{font-size:11.5px;color:var(--ink-soft);font-weight:600;}
.toggle-group{display:inline-flex;border:1px solid var(--line);border-radius:8px;overflow:hidden;}
.toggle-group .tgl{
  border:none;background:#fff;color:var(--ink-soft);font-size:12px;font-weight:600;
  padding:6px 10px;cursor:pointer;font-family:'Inter';
}
.toggle-group .tgl:first-child{border-right:1px solid var(--line);}
.toggle-group .tgl.on.yes{background:var(--teal);color:#fff;}
.toggle-group .tgl.on.no{background:var(--paper-2);color:var(--ink);}

.toolbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:14px;}
.toolbar .spacer{flex:1;}

.modal-backdrop{position:fixed;inset:0;background:rgba(28,24,16,.45);display:none;align-items:center;justify-content:center;z-index:50;padding:20px;}
.modal-backdrop.open{display:flex;}
.modal{background:var(--card);border-radius:16px;padding:22px;width:100%;max-width:420px;box-shadow:0 20px 50px rgba(0,0,0,.3);}
.modal h3{margin:0 0 14px;font-size:16px;}
.modal .fields{display:flex;flex-direction:column;gap:12px;}
.modal .actions{display:flex;justify-content:flex-end;gap:8px;margin-top:18px;}

.empty{padding:30px;text-align:center;color:var(--gray);font-size:13px;border:1px dashed var(--line);border-radius:12px;}

.toast{position:fixed;bottom:20px;right:20px;background:var(--ink);color:#fff;padding:10px 16px;border-radius:10px;font-size:13px;box-shadow:var(--shadow);opacity:0;transform:translateY(10px);transition:opacity .25s, transform .25s;z-index:60;}
.toast.show{opacity:1;transform:translateY(0);}

.legend{display:flex;gap:16px;flex-wrap:wrap;font-size:12px;color:var(--ink-soft);margin-bottom:10px;}
.legend span{display:inline-flex;align-items:center;gap:6px;}
.legend .sw{width:10px;height:10px;border-radius:3px;}

/* LOGIN SCREEN */
.login-screen{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:radial-gradient(circle at 20% 15%, rgba(242,96,15,.18), transparent 50%),
             radial-gradient(circle at 85% 85%, rgba(226,55,30,.16), transparent 50%),
             var(--paper);
  padding:20px;
}
.login-card{
  background:var(--card);border:1px solid var(--line);border-radius:18px;
  padding:30px 28px;width:100%;max-width:380px;box-shadow:0 12px 34px rgba(0,0,0,.12);
  text-align:center;
}
.login-logo{height:46px;object-fit:contain;margin-bottom:14px;}
.login-card h2{margin:4px 0 4px;font-size:19px;}
.login-card p{margin:0 0 16px;color:var(--ink-soft);font-size:12.5px;line-height:1.5;}
.login-card .fields{display:flex;flex-direction:column;gap:12px;text-align:left;}
.login-error{color:var(--danger);font-size:12px;margin-top:10px;min-height:14px;}

@media(max-width:880px){
  .sidebar{position:fixed;left:-260px;top:0;z-index:40;transition:left .2s;box-shadow:6px 0 20px rgba(0,0,0,.3);}
  .sidebar.open{left:0;}
  .mobile-toggle{display:flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:8px;border:1px solid var(--line);background:var(--card);}
  .topbar{padding:16px 16px 0;}
  main.scroll{padding:14px 16px 50px;}
}

</style>

/* ---- Tabelas "documento" (id fixo ou por ciclo, com a coluna jsonb "data") ----
   Mantemos isso para não precisar reescrever toda a lógica de cálculo que já
   existe no app — cada "pedaço" de estado (employees, periodCrescimento etc.)
   continua sendo um objeto JS normal, só que agora persistido no Supabase. */
async function getJSON(key, fallback){
  try{
    if(key==='employees'){
      const {data, error} = await sb.from('employees').select('id, data');
      if(error) throw error;
      const out={}; // employees é array no app -> reconstituímos a partir das linhas
      return data && data.length ? data.map(r=>({...r.data, id:r.id})) : fallback;
    }
    if(key==='usuarios'){
      const {data, error} = await sb.from('profiles').select('id, nome, papel');
      if(error) throw error;
      return data || fallback;
    }
    if(key==='config'){
      const {data, error} = await sb.from('app_config').select('data').eq('id','app').single();
      if(error) throw error;
      return data ? data.data : fallback;
    }
    // periodCrescimento, periodAdmin, periodFinanceiro -> tabelas chave/valor
    const TABLE_MAP = {
      periodCrescimento: {table:'period_crescimento', col:'ciclo_id'},
      periodAdmin: {table:'period_admin', col:'mes_id'},
      periodFinanceiro: {table:'period_financeiro', col:'bim_id'}
    };
    const map = TABLE_MAP[key];
    if(map){
      const {data, error} = await sb.from(map.table).select(`${map.col}, data`);
      if(error) throw error;
      const obj={};
      (data||[]).forEach(r=>{ obj[r[map.col]] = r.data; });
      return obj;
    }
    return fallback;
  }catch(e){ console.error('getJSON error', key, e); return fallback; }
}

async function setJSON(key, value){
  try{
    if(key==='employees'){
      // value é um array de colaboradores (cada um com .id) -> upsert linha a linha
      const rows = value.map(emp=>({ id: emp.id, data: emp }));
      if(rows.length){
        const {error} = await sb.from('employees').upsert(rows);
        if(error) throw error;
      }
      // remove do banco quem não está mais no array local
      const {data: existing} = await sb.from('employees').select('id');
      const idsAtuais = new Set(value.map(e=>e.id));
      const idsRemover = (existing||[]).filter(r=>!idsAtuais.has(r.id)).map(r=>r.id);
      if(idsRemover.length) await sb.from('employees').delete().in('id', idsRemover);
      return;
    }
    if(key==='config'){
      const {error} = await sb.from('app_config').upsert({id:'app', data:value});
      if(error) throw error;
      return;
    }
    const TABLE_MAP = {
      periodCrescimento: {table:'period_crescimento', col:'ciclo_id'},
      periodAdmin: {table:'period_admin', col:'mes_id'},
      periodFinanceiro: {table:'period_financeiro', col:'bim_id'}
    };
    const map = TABLE_MAP[key];
    if(map){
      const rows = Object.keys(value).map(k=>({ [map.col]: k, data: value[k] }));
      if(rows.length){
        const {error} = await sb.from(map.table).upsert(rows);
        if(error) throw error;
      }
      const {data: existing} = await sb.from(map.table).select(map.col);
      const idsAtuais = new Set(Object.keys(value));
      const idsRemover = (existing||[]).filter(r=>!idsAtuais.has(r[map.col])).map(r=>r[map.col]);
      if(idsRemover.length) await sb.from(map.table).delete().in(map.col, idsRemover);
      return;
    }
    // 'usuarios' (profiles) é tratado por funções próprias de perfil, não aqui.
  }catch(e){ console.error('storage error', key, e); showToast('Erro ao salvar dados.'); }
}

function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function brl(n){ return (Number(n)||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'}); }
function pct(n){ return (Number(n)||0).toLocaleString('pt-BR',{minimumFractionDigits:1,maximumFractionDigits:1})+'%'; }
function pad(n){ return n<10? '0'+n : ''+n; }
function lastDay(year, monthIndex){ return new Date(year, monthIndex+1, 0); }
function isoDate(d){ return d.toISOString().slice(0,10); }
function fmtDate(d){ if(typeof d==='string') d=new Date(d+'T00:00:00'); return d.toLocaleDateString('pt-BR'); }
function addBusinessDays(dateObj, n){
  let d = new Date(dateObj);
  let count=0;
  while(count<n){
    d.setDate(d.getDate()+1);
    const dow=d.getDay();
    const iso=isoDate(d);
    if(dow!==0 && dow!==6 && !config.holidays.includes(iso)) count++;
  }
  return d;
}

/* ====================== CALCULATIONS ====================== */
function crescimento(inicio, fim){
  if(!inicio) return 0;
  return ((fim-inicio)/inicio)*100;
}
function calcPorteiro(salario, crescimentoPct){
  const hit = crescimentoPct>=8;
  return { hit, pctSalario: hit?50:0, valor: hit? salario*0.5 : 0 };
}
// As 3 metas do Administrativo são coletivas: uma única marcação por meta vale para toda a equipe do setor.
function calcAdminTeam(data){
  const itens=[
    {nome:'Rematrícula', hit: !!data.remaHit, pctSalario:12},
    {nome:'Matrícula', hit: !!data.matHit, pctSalario:3},
    {nome:'Adimplência', hit: !!data.inadHit, pctSalario:5}
  ];
  let totalPct = itens.reduce((s,i)=> s + (i.hit? i.pctSalario:0), 0);
  totalPct = Math.min(totalPct, 20);
  return { itens, totalPct };
}
function calcFinanceiro(salario, inad){
  let nivel=0, pctSalario=0;
  if(inad<=15){ nivel=1; pctSalario=20; }
  else if(inad<=20){ nivel=2; pctSalario=15; }
  else if(inad<=25){ nivel=3; pctSalario=10; }
  return { nivel, pctSalario, valor: salario*pctSalario/100 };
}
function calcGeral(crescimentoPct){
  if(crescimentoPct>=15) return {nivel:2, valor:10000};
  if(crescimentoPct>=10) return {nivel:1, valor:5000};
  return {nivel:0, valor:0};
}

    email, password: senha,
    options: { data: { nome, papel } }
  });
  if(error){ erroEl.textContent = traduzErroAuth(error); return; }
  if(data.session){
    // Confirmação de e-mail desativada no projeto -> já entra direto
    await afterLogin();
  } else {
    erroEl.style.color = 'var(--teal)';
    erroEl.textContent = 'Conta criada! Verifique seu e-mail para confirmar o acesso antes de entrar.';
  }
}
async function tentarLogin(){
  const email=document.getElementById('li-email').value.trim();
  const senha=document.getElementById('li-senha').value;
  const erroEl=document.getElementById('loginErro');
  if(!email||!senha){ erroEl.textContent='Preencha e-mail e senha.'; return; }
  const {data, error} = await sb.auth.signInWithPassword({ email, password: senha });
  if(error){ erroEl.textContent = traduzErroAuth(error); return; }
  await afterLogin();
}
async function enviarRecuperacao(){
  const email=document.getElementById('rec-email').value.trim();
  const erroEl=document.getElementById('loginErro');
  if(!email){ erroEl.textContent='Informe seu e-mail.'; return; }
  const {error} = await sb.auth.resetPasswordForEmail(email, { redirectTo: window.location.href });
  if(error){ erroEl.textContent = traduzErroAuth(error); return; }
  erroEl.style.color = 'var(--teal)';
  erroEl.textContent = 'Se esse e-mail estiver cadastrado, um link de redefinição foi enviado.';
}
function traduzErroAuth(error){
  const msg = (error && error.message) || '';
  if(msg.includes('Invalid login credentials')) return 'E-mail ou senha incorretos.';
  if(msg.includes('User already registered')) return 'Já existe uma conta com esse e-mail. Tente entrar.';
  if(msg.includes('Password should be')) return 'Senha muito curta (mínimo 6 caracteres).';
  return msg || 'Não foi possível concluir. Tente novamente.';
}
async function afterLogin(){
  const {data:{session}} = await sb.auth.getSession();
  if(!session){ return; }
  await loadAll();
  const {data: perfil} = await sb.from('profiles').select('id, nome, papel').eq('id', session.user.id).single();
  currentUser = perfil || { id: session.user.id, nome: session.user.email, papel: 'Outro' };
  startApp();
}
async function logout(){
  await sb.auth.signOut();
  currentUser=null;
  document.getElementById('appRoot').style.display='none';
  document.getElementById('loginScreen').style.display='flex';
  loginMode='entrar';
  renderLoginGate();
}
function startApp(){
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('appRoot').style.display='flex';
  renderNav();
  goTab('dashboard');
}

function exportCSV(){
  const sel=config.lastSelected;
  const rows=[['Setor','Colaborador','Cargo','Período','% Salário','Valor (R$)','Data de Pagamento']];
  const cicloC=sel.cicloCrescimento||todayDefaultCiclo(), monthA=sel.administrativo||todayDefaultMonth(), bimF=sel.financeiro||todayDefaultBim();
  const optC=findOpt(cicloOptions(),cicloC), optA=findOpt(monthOptions(),monthA), optF=findOpt(bimOptions(),bimF);
  const dataC=periodCrescimento[cicloC]||{alunosInicio:0,alunosFim:0};
  const cresc=crescimento(dataC.alunosInicio,dataC.alunosFim);
  empsBySetor('porteiro_asg').forEach(e=>{ const r=calcPorteiro(e.salario,cresc); rows.push(['Porteiro/ASG', e.nome, e.cargo, optC?optC.label:'', r.pctSalario+'%', r.valor.toFixed(2), optC?fmtDate(addBusinessDays(optC.fim,5)):'']); });
  const dataA=periodAdmin[monthA]||{remaHit:false,matHit:false,inadHit:false};
  const calcA=calcAdminTeam(dataA);
  empsBySetor('administrativo').forEach(e=>{ const valor=e.salario*calcA.totalPct/100; rows.push(['Administrativo', e.nome, e.cargo, optA?optA.label:'', calcA.totalPct+'%', valor.toFixed(2), optA?fmtDate(addBusinessDays(optA.fim,5)):'']); });
  const dataF=periodFinanceiro[bimF]||{registros:{}};
  empsBySetor('financeiro').forEach(e=>{ const reg=(dataF.registros||{})[e.id]||{inadimplencia:100}; const r=calcFinanceiro(e.salario,reg.inadimplencia); rows.push(['Financeiro', e.nome, e.cargo, optF?optF.label:'', r.pctSalario+'%', r.valor.toFixed(2), optF?fmtDate(addBusinessDays(optF.fim,5)):'']); });
  const csv=rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(';')).join('\n');
  const blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download='resumo_premiacao.csv'; document.body.appendChild(a); a.click(); a.remove();
  showToast('CSV exportado.');
}

      <div class="card stat"><span class="label">Pagamento (5º dia útil)</span><span class="value mono" style="font-size:18px;">${pay?fmtDate(pay):'—'}</span><span class="meta">Fechamento: ${opt?fmtDate(opt.fim):'—'}</span></div>
    </div>

    <div class="section-head"><h2>Colaboradores — Porteiro / ASG</h2><span class="note">${emps.length} colaborador(es)</span></div>

      const r=calcPorteiro(e.salario, cresc);
      return `<div class="emp-row">
        <div class="seal-badge ${r.hit?'hit':''}">${r.hit?'8%+':'—'}</div>
        <div class="who"><div class="nm">${e.nome}</div><div class="cg">${e.cargo} · ${brl(e.salario)}</div></div>

/* ====================== COMERCIAL (cadastro por enquanto — regra de premiação a definir) ====================== */

/* ====================== ADMINISTRATIVO (3 metas coletivas — uma marcação vale para toda a equipe) ====================== */
function captureAdminNota(mes){
  if(!periodAdmin[mes]) periodAdmin[mes]={remaHit:false,matHit:false,inadHit:false,nota:''};
  const notaEl=document.getElementById('in-admin-nota');
  if(notaEl) periodAdmin[mes].nota=notaEl.value;
}
function setAdminTeamToggle(field, val){
  const mes=document.getElementById('sel-mes-a').value;
  captureAdminNota(mes);
  periodAdmin[mes][field]=val;
  config.lastSelected.administrativo=mes;
  renderAdministrativo();
}
async function trocarMesAdmin(){
  const mes=document.getElementById('sel-mes-a').value;
  config.lastSelected.administrativo=mes;
  if(!periodAdmin[mes]) periodAdmin[mes]={remaHit:false,matHit:false,inadHit:false,nota:''};
  await saveConfig();
  renderAdministrativo();
}
async function salvarAdmin(){
  const mes=document.getElementById('sel-mes-a').value;
  captureAdminNota(mes);
  config.lastSelected.administrativo=mes;
  await saveAdmin(); await saveConfig();
  renderAdministrativo(); showToast('Apuração do mês salva.');
}

function metaCard(titulo, pctTag, hit, field){
  return `<div class="card" style="display:flex;flex-direction:column;gap:10px;">
    <div style="display:flex;align-items:center;justify-content:space-between;">
      <span style="font-weight:700;font-size:14px;">${titulo}</span>
      <span class="badge ${hit?'ok':'no'}">+${pctTag}%</span>
    </div>
    <div class="toggle-group" style="align-self:flex-start;">
      <button type="button" class="tgl ${hit? 'on yes':''}" onclick="setAdminTeamToggle('${field}',true)">Bateu a meta</button>
      <button type="button" class="tgl ${!hit? 'on no':''}" onclick="setAdminTeamToggle('${field}',false)">Não bateu</button>
    </div>
  </div>`;
}

function renderAdministrativo(){
  const opts = monthOptions();
  const current = config.lastSelected.administrativo || todayDefaultMonth();
  const opt = findOpt(opts, current);
  const data = periodAdmin[current] || {remaHit:false, matHit:false, inadHit:false, nota:''};
  const pay = opt? addBusinessDays(opt.fim,5):null;
  const emps = empsBySetor('administrativo');
  const calc = calcAdminTeam(data);
  let totalMes=0;

  const rowsHtml = emps.map(e=>{
    const valor = e.salario*calc.totalPct/100;
    totalMes += valor;
    return `<tr><td>${e.nome}</td><td>${e.cargo}</td><td class="num">${brl(e.salario)}</td><td class="num">${brl(valor)}</td></tr>`;
  }).join('');

  document.getElementById('tab-administrativo').innerHTML = `
    <div class="rule-box">3 pilares mensais, <b>coletivos para toda a equipe do setor</b> — uma única marcação de cada meta vale para todos os colaboradores (Direção pedagógica, Auxiliar de direção, Chefe de secretaria, Secretaria, Sucesso do aluno, Coordenação de estágio). Acumulativos até o máximo de <b>20% do salário</b> de cada um; se nenhuma meta for batida, não há premiação:<br>
    • <b>Rematrícula</b> acima da meta móvel do portal Anhanguera → +12% do salário<br>
    • <b>Matrícula</b> acima da meta móvel do portal Anhanguera → +3% do salário<br>
    • <b>Adimplência</b> igual ou abaixo da meta definida para o bimestre → +5% do salário<br>
    Verifique cada indicador no portal/relatório oficial e marque "Bateu a meta" ou "Não bateu" abaixo.</div>

    <div class="toolbar">
      <label class="field" style="min-width:220px;">Mês de apuração<select id="sel-mes-a">${opts.map(o=>`<option value="${o.id}" ${o.id===current?'selected':''}>${o.label}</option>`).join('')}</select></label>
      <button class="btn primary" style="align-self:flex-end;" onclick="trocarMesAdmin()">Trocar / criar mês</button>
    </div>

    <div class="section-head"><h2>As 3 metas do mês</h2><span class="note">Uma marcação por meta — vale para toda a equipe</span></div>
    <div class="grid cols-3">
      ${metaCard('Rematrícula', 12, data.remaHit, 'remaHit')}
      ${metaCard('Matrícula', 3, data.matHit, 'matHit')}
      ${metaCard('Adimplência', 5, data.inadHit, 'inadHit')}
    </div>

    <label class="field" style="margin-top:14px;max-width:420px;">Observação / meta de referência deste mês (opcional)<input type="text" id="in-admin-nota" style="font-family:Inter" value="${data.nota? data.nota.replace(/"/g,'&quot;') : ''}" placeholder="Ex.: meta de inadimplência de julho = 20%"></label>

    <div class="grid cols-2" style="margin-top:16px;">
      <div class="card stat"><span class="label">% do salário aplicado (toda a equipe)</span><span class="value">${calc.totalPct}%</span><span class="meta">12% + 3% + 5% (máx. 20%)</span></div>
      <div class="card stat"><span class="label">Pagamento (5º dia útil)</span><span class="value mono" style="font-size:18px;">${pay?fmtDate(pay):'—'}</span><span class="meta">Fechamento: ${opt?fmtDate(opt.fim):'—'}</span></div>
    </div>

    <div class="section-head"><h2>Valor por colaborador</h2><span class="note">Total do mês: ${brl(totalMes)}</span></div>
    ${emps.length? `<table class="app-table">
      <thead><tr><th>Nome</th><th>Cargo</th><th class="num">Salário</th><th class="num">Premiação (${calc.totalPct}%)</th></tr></thead>
      <tbody>${rowsHtml}</tbody>
    </table>` : `<div class="empty">Nenhum colaborador cadastrado no setor Administrativo. <a href="#" onclick="goTab('colaboradores');return false;">Cadastrar agora</a>.</div>`}

    <div class="toolbar" style="margin-top:14px;"><button class="btn gold" onclick="salvarAdmin()">Salvar apuração do mês</button></div>
  `;
}

/* ====================== FINANCEIRO (COBRANÇA) — por colaborador, mantém como estava ====================== */
function renderFinanceiro(){
  const opts = bimOptions();
  const current = config.lastSelected.financeiro || todayDefaultBim();
  const opt = findOpt(opts, current);
  const data = periodFinanceiro[current] || {registros:{}};
  const pay = opt? addBusinessDays(opt.fim,5):null;
  const emps = empsBySetor('financeiro');
  let totalBim=0;

  const rowsHtml = emps.map(e=>{
    const reg = data.registros[e.id] || {inadimplencia:100};
    const r = calcFinanceiro(e.salario, reg.inadimplencia);
    totalBim += r.valor;
    return `<div class="emp-row" data-emp="${e.id}">
      <div class="seal-badge ${r.nivel?'hit':''}">${r.nivel? 'N'+r.nivel : '—'}</div>
      <div class="who"><div class="nm">${e.nome}</div><div class="cg">${e.cargo} · ${brl(e.salario)}</div></div>
      <div class="inputs">
        <label class="field">Inadimplência da carteira (%)<input type="number" step="0.1" class="fin-input" data-emp="${e.id}" value="${reg.inadimplencia||0}"></label>
      </div>
      <div class="result"><div class="v">${brl(r.valor)}</div><div class="p">${r.pctSalario}% do salário ${r.nivel?'· Nível '+r.nivel:'· sem premiação'}</div></div>
    </div>`;
  }).join('');

  document.getElementById('tab-financeiro').innerHTML = `
    <div class="rule-box">Metas bimestrais por nível de inadimplência <b>da carteira de cada colaborador</b> (aqui sim a meta é individual, pois cada cobrador responde pela própria carteira):<br>
    • Nível 1 — 0% a 15% → <b>20%</b> do salário<br>
    • Nível 2 — 15,1% a 20% → <b>15%</b> do salário<br>
    • Nível 3 — 20,1% a 25% → <b>10%</b> do salário<br>
    • Acima de 25,1% → sem premiação</div>

    <div class="toolbar">
      <label class="field" style="min-width:220px;">Bimestre de apuração<select id="sel-bim-f">${opts.map(o=>`<option value="${o.id}" ${o.id===current?'selected':''}>${o.label}</option>`).join('')}</select></label>
      <button class="btn primary" style="align-self:flex-end;" onclick="trocarBimFinanceiro()">Trocar / criar bimestre</button>
    </div>

    <div class="grid cols-2">
      <div class="card stat"><span class="label">Total a pagar no bimestre</span><span class="value">${brl(totalBim)}</span><span class="meta">${opt?opt.label:''}</span></div>
      <div class="card stat"><span class="label">Pagamento (5º dia útil)</span><span class="value mono" style="font-size:18px;">${pay?fmtDate(pay):'—'}</span><span class="meta">Fechamento: ${opt?fmtDate(opt.fim):'—'}</span></div>
    </div>

    <div class="section-head"><h2>Apuração individual</h2><span class="note">${emps.length} colaborador(es)</span></div>
    ${emps.length? rowsHtml : `<div class="empty">Nenhum colaborador cadastrado no setor Financeiro. <a href="#" onclick="goTab('colaboradores');return false;">Cadastrar agora</a>.</div>`}
    ${emps.length? `<div class="toolbar" style="margin-top:14px;"><button class="btn gold" onclick="salvarFinanceiro()">Salvar apuração do bimestre</button></div>` : ''}
  `;
}
async function trocarBimFinanceiro(){
  const bim=document.getElementById('sel-bim-f').value;
  config.lastSelected.financeiro=bim;
  if(!periodFinanceiro[bim]) periodFinanceiro[bim]={registros:{}};
  await saveConfig();
  renderFinanceiro();
}
async function salvarFinanceiro(){
  const bim=document.getElementById('sel-bim-f').value;
  const registros=(periodFinanceiro[bim]&&periodFinanceiro[bim].registros)||{};
  document.querySelectorAll('.fin-input').forEach(inp=>{
    const empId=inp.dataset.emp;
    registros[empId]={inadimplencia: parseFloat(inp.value)||0};
  });
  periodFinanceiro[bim]={registros};
  config.lastSelected.financeiro=bim;
  await saveFinanceiro(); await saveConfig();
  renderFinanceiro(); showToast('Apuração do bimestre salva.');
}

/* ====================== PREMIAÇÃO GERAL (leitura do Crescimento do Polo) ====================== */

    <div class="toolbar">
      <div class="card" style="flex:1;display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 16px;">

        <button class="btn sm" onclick="goTab('dashboard')">Editar no Dashboard</button>

    <div class="grid cols-3">

      <div class="card stat"><span class="label">Verba para confraternização</span><span class="value">${brl(res.valor)}</span><span class="meta">A organizar pela direção do Polo</span></div>

/* ====================== CONFIGURAÇÕES ====================== */
function renderConfig(){
  document.getElementById('tab-config').innerHTML = `
    <div class="section-head"><h2>Feriados (excluídos do cálculo de dias úteis)</h2></div>
    <div class="toolbar">
      <input type="date" id="in-holiday" style="max-width:180px;">
      <button class="btn primary" onclick="addHoliday()">+ Adicionar feriado</button>
    </div>
    ${config.holidays.length? `<table class="app-table"><thead><tr><th>Data</th><th></th></tr></thead><tbody>
      ${config.holidays.sort().map(h=>`<tr><td>${fmtDate(h)}</td><td style="text-align:right;"><button class="btn sm danger" onclick="removeHoliday('${h}')">Remover</button></td></tr>`).join('')}
    </tbody></table>` : `<div class="empty">Nenhum feriado cadastrado — o cálculo considera apenas sábados e domingos como não úteis.</div>`}

    <div class="section-head"><h2>Backup dos dados</h2><span class="note">Exporte ou restaure todos os dados do app (colaboradores, apurações, usuários e configurações)</span></div>
    <div class="toolbar">
      <button class="btn" onclick="exportBackup()">Exportar backup (.json)</button>
      <button class="btn" onclick="document.getElementById('in-restore').click()">Restaurar backup</button>
      <input type="file" id="in-restore" accept=".json" style="display:none" onchange="restoreBackup(event)">
    </div>

    <div class="section-head"><h2>Armazenamento</h2></div>
    <div class="rule-box">Os dados deste sistema ficam salvos num banco de dados real (<b>Supabase</b>), sincronizados automaticamente entre todos que acessarem com sua conta de e-mail. Funciona em qualquer dispositivo — celular, tablet ou computador — sem precisar do Claude ou de um arquivo local. O acesso é protegido por login (e-mail e senha validados no servidor); apenas pessoas com conta autorizada conseguem ver ou editar essas informações.</div>

    <div class="section-head"><h2>Zona de risco</h2></div>
    <div class="toolbar"><button class="btn danger" onclick="limparTudo()">Limpar todos os dados do app</button></div>
  `;
}
async function addHoliday(){
  const v=document.getElementById('in-holiday').value;
  if(!v) return;
  if(!config.holidays.includes(v)) config.holidays.push(v);
  await saveConfig(); renderConfig(); showToast('Feriado adicionado.');
}
async function removeHoliday(h){
  config.holidays=config.holidays.filter(x=>x!==h);
  await saveConfig(); renderConfig();
}
function exportBackup(){
  const backup={employees,periodCrescimento,periodAdmin,periodFinanceiro,config,usuarios};
  const blob=new Blob([JSON.stringify(backup,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download='backup_plano_metas.json'; document.body.appendChild(a); a.click(); a.remove();
  showToast('Backup exportado.');
}
function restoreBackup(ev){
  const file=ev.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=async ()=>{
    try{
      const b=JSON.parse(reader.result);
      employees=b.employees||[]; periodCrescimento=b.periodCrescimento||{}; periodAdmin=b.periodAdmin||{};
      periodFinanceiro=b.periodFinanceiro||{}; config=b.config||{holidays:[],lastSelected:{}};
      await saveEmployees(); await saveCrescimento(); await saveAdmin(); await saveFinanceiro(); await saveConfig();
      renderAll(); showToast('Backup restaurado.');
    }catch(e){ showToast('Arquivo inválido.'); }
  };
  reader.readAsText(file);
}
async function limparTudo(){
  if(!confirm('Isso apagará TODOS os colaboradores e apurações salvas (os usuários de login serão mantidos). Esta ação não pode ser desfeita. Continuar?')) return;
  employees=[]; periodCrescimento={}; periodAdmin={}; periodFinanceiro={}; config={holidays:[],lastSelected:{}};
  await saveEmployees(); await saveCrescimento(); await saveAdmin(); await saveFinanceiro(); await saveConfig();
  renderAll(); showToast('Os dados de colaboradores e apurações foram apagados.');
}

/* ====================== INIT ====================== */
async function init(){
  const {data:{session}} = await sb.auth.getSession();
  if(session){
    await afterLogin();
  } else {
    renderLoginGate();
  }
  sb.auth.onAuthStateChange((event)=>{
    if(event==='SIGNED_OUT'){
      document.getElementById('appRoot').style.display='none';
      document.getElementById('loginScreen').style.display='flex';
    }
  });
}
init();

/* ====================== PWA: registra o service worker ====================== */
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('./service-worker.js').catch(err=>{
      console.warn('Service worker não registrado:', err);
    });
  });
}
